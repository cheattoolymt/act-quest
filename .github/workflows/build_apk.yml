name: Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract project ZIP
        run: unzip action_quest_wifi_fixed.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      # 新しいキーストアをActions内で生成（Java17互換のPKCS12形式）
      - name: Generate keystore
        working-directory: action_quest_fixed/flutter_app
        run: |
          keytool -genkeypair \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore android/release-key.jks \
            -storetype PKCS12 \
            -storepass "ActionQuest2024!" \
            -keypass "ActionQuest2024!" \
            -dname "CN=ActionQuest, OU=Game, O=ActionQuest, L=Tokyo, ST=Tokyo, C=JP"
          echo "JKS size: $(wc -c < android/release-key.jks) bytes"

      - name: Create key.properties
        working-directory: action_quest_fixed/flutter_app
        run: |
          cat > android/key.properties << 'KEYEOF'
          storePassword=ActionQuest2024!
          keyPassword=ActionQuest2024!
          keyAlias=release
          storeFile=../release-key.jks
          KEYEOF

      - name: Flutter pub get
        working-directory: action_quest_fixed/flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: action_quest_fixed/flutter_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: action-quest-release
          path: action_quest_fixed/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
