name: Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract project ZIP
        run: unzip action_quest_wifi_fixed.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      # JKS: printf で改行なしデコード（echoだと改行が混入して壊れる）
      - name: Restore keystore
        working-directory: action_quest_fixed/flutter_app
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/release-key.jks
          echo "JKS size: $(wc -c < android/release-key.jks) bytes"

      - name: Create key.properties
        working-directory: action_quest_fixed/flutter_app
        run: |
          cat > android/key.properties << KEYEOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../release-key.jks
          KEYEOF

      - name: Fix NDK version
        working-directory: action_quest_fixed/flutter_app
        run: |
          sed -i '/^android {/a\        ndkVersion = "27.0.12077973"' android/app/build.gradle.kts

      - name: Flutter pub get
        working-directory: action_quest_fixed/flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: action_quest_fixed/flutter_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: action-quest-release
          path: action_quest_fixed/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
